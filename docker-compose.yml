services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./results:/app/results:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
